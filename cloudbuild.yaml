steps:
  # Step 1: Compile the Go Application
  - name: 'gcr.io/cloud-builders/go'
    id: 'Compile application'
    env: ['GOPATH=/gopath']
    args: ['build', '-o', 'main', 'main.go']

  # Step 2: Build the Docker image for the Go application
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Build Docker image'
    args: ['build', '-t', 'us-east4-docker.pkg.dev/$PROJECT_ID/my-repository/sample-app:v1.0', '.']

  # Step 3: Push the Docker image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Push Docker image'
    args: ['push', 'us-east4-docker.pkg.dev/$PROJECT_ID/my-repository/sample-app:v1.0']

  # Step 4: Apply the production deployment YAML file
  - name: 'gcr.io/cloud-builders/kubectl'
    id: 'Deploy to prod'
    args: ['apply', '-f', 'prod/deployment.yaml', '-n', 'prod']
    env:
      - 'CLOUDSDK_COMPUTE_ZONE=us-east4-a'
      - 'CLOUDSDK_CONTAINER_CLUSTER=hello-cluster'

options:
  logging: CLOUD_LOGGING_ONLY
